<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEON TODO // CYBERPUNK</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    /* ========== RESET & BASE ========== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --cyan:    #00f0ff;
      --magenta: #d400ff;
      --yellow:  #ffe600;
      --red:     #ff3366;
      --green:   #00ff66;
      --dark:    #0a0a0c;
      --panel:   #0f0f14;
      --border:  rgba(0,240,255,.35);
      --text:    #c0c0d0;
    }

    body {
      font-family: 'Rajdhani', 'Microsoft YaHei', sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      background-image:
        linear-gradient(rgba(0,240,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,240,255,.03) 1px, transparent 1px);
      background-size: 40px 40px;
      overflow-x: hidden;
    }

    body::after {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 999;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,.06) 2px,
        rgba(0,0,0,.06) 4px
      );
    }

    .container {
      position: relative; z-index: 1;
      width: 100%; max-width: 520px;
      background: var(--panel);
      border: 2px solid var(--border);
      border-radius: 4px;
      padding: 36px 32px 28px;
      box-shadow:
        0 0 20px rgba(0,240,255,.08),
        0 0 60px rgba(0,240,255,.03),
        inset 0 1px 0 rgba(255,255,255,.02);
      clip-path: polygon(
        0 18px, 18px 0,
        calc(100% - 18px) 0, 100% 18px,
        100% calc(100% - 18px), calc(100% - 18px) 100%,
        18px 100%, 0 calc(100% - 18px)
      );
    }

    .container::before {
      content: '';
      position: absolute; inset: -2px;
      border-radius: 4px; padding: 2px;
      background: linear-gradient(135deg, var(--cyan), var(--magenta), var(--cyan));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor; mask-composite: exclude;
      opacity: .5;
      pointer-events: none;
    }

    .status-bar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 24px; font-family: 'Orbitron', monospace;
      font-size: 10px; letter-spacing: 2px;
      color: var(--cyan); opacity: .7;
    }
    .status-bar .blip { animation: blip 1.5s ease-in-out infinite; }
    #logoutWrap { text-align: center; margin-top: 16px; }
    #logoutBtn { background: none; border: 1px solid rgba(255,51,102,.3); color: rgba(255,255,255,.3); padding: 4px 16px; cursor: pointer; font-family: 'Orbitron', monospace; font-size: 9px; letter-spacing: 2px; transition: all .25s; }
    #logoutBtn:hover { border-color: var(--red); color: var(--red); text-shadow: 0 0 8px var(--red); }

    @keyframes blip {
      0%, 100% { opacity: .4; } 50% { opacity: 1; }
    }

    h1 {
      font-family: 'Orbitron', monospace;
      font-size: 26px; font-weight: 900;
      text-align: center; letter-spacing: 6px;
      margin-bottom: 28px;
      color: #fff;
      text-shadow:
        0 0 10px var(--cyan),
        0 0 30px var(--cyan),
        0 0 60px var(--magenta),
        0 0 80px var(--magenta);
      animation: titleFlicker 3s linear infinite;
    }
    h1 .bracket { color: var(--cyan); text-shadow: 0 0 15px var(--cyan); }

    @keyframes titleFlicker {
      0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
      20%, 24%, 55% { opacity: .85; }
    }

    /* ========== AUTH FORM ========== */
    .auth-section { margin-bottom: 20px; }
    .auth-tabs { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
    .auth-tabs button {
      flex: 1; padding: 14px; background: none; border: none;
      font-family: 'Orbitron', monospace; font-size: 16px; letter-spacing: 3px;
      color: rgba(255,255,255,.25); cursor: pointer; transition: all .3s;
      border-bottom: 2px solid transparent;
    }
    .auth-tabs button.active { color: var(--cyan); border-bottom-color: var(--cyan); text-shadow: 0 0 15px var(--cyan), 0 0 30px var(--cyan); }
    .auth-tabs button:hover { color: var(--cyan); }
    .auth-tabs button.active { color: var(--cyan); border-bottom-color: var(--cyan); text-shadow: 0 0 10px var(--cyan); }
    .auth-tabs button:hover { color: var(--cyan); }

    .auth-form { display: flex; flex-direction: column; gap: 14px; }
    .auth-form input {
      background: transparent; border: 2px solid var(--border); border-radius: 2px;
      padding: 14px 16px; font-family: 'Rajdhani', sans-serif; font-size: 17px;
      color: #ffffff; caret-color: var(--magenta); outline: none; transition: all .3s;
    }
    .auth-form input::placeholder { color: rgba(0,240,255,.45); font-size: 15px; }
    .auth-form input:focus { border-color: var(--cyan); box-shadow: 0 0 20px rgba(0,240,255,.2); }
    .auth-form button {
      padding: 16px; background: transparent; border: 2px solid var(--cyan);
      border-radius: 2px; font-family: 'Orbitron', monospace; font-size: 16px;
      font-weight: 700; letter-spacing: 3px; color: var(--cyan); cursor: pointer;
      transition: all .25s;
    }
    .auth-form button:hover {
      background: rgba(0,240,255,.12);
      box-shadow: 0 0 30px rgba(0,240,255,.3), inset 0 0 20px rgba(0,240,255,.05);
    }
    .auth-form .auth-hint {
      text-align: center; font-size: 13px; color: rgba(0,240,255,.55);
      font-family: 'Orbitron', monospace; letter-spacing: 1px;
    }

    /* ========== TODO SECTION ========== */
    .todo-section { display: none; }

    .error-msg {
      background: rgba(255,51,102,.1);
      border: 1px solid var(--red);
      color: var(--red);
      padding: 10px 16px; margin-bottom: 16px;
      font-family: 'Rajdhani', sans-serif; font-weight: 500; font-size: 15px;
      text-shadow: 0 0 8px var(--red);
      box-shadow: 0 0 20px rgba(255,51,102,.15);
      display: none;
    }
    .error-msg.show { display: block; animation: errFlash .3s ease-out; }

    @keyframes errFlash {
      0% { box-shadow: 0 0 40px rgba(255,51,102,.5); }
      100% { box-shadow: 0 0 20px rgba(255,51,102,.15); }
    }

    .input-group {
      display: flex; gap: 10px; margin-bottom: 24px;
    }
    .input-group input {
      flex: 1;
      background: transparent;
      border: 2px solid var(--border);
      border-radius: 2px;
      padding: 14px 16px;
      font-family: 'Rajdhani', sans-serif; font-size: 17px; font-weight: 500;
      color: #ffffff;
      caret-color: var(--magenta);
      outline: none;
      transition: all .3s;
      letter-spacing: 1px;
    }
    .input-group input::placeholder { color: rgba(0,240,255,.45); font-size: 15px; }
    .input-group input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 15px rgba(0,240,255,.15), inset 0 0 15px rgba(0,240,255,.05);
    }
    .input-group button {
      padding: 14px 28px;
      background: transparent;
      border: 2px solid var(--cyan);
      border-radius: 2px;
      font-family: 'Orbitron', monospace; font-size: 15px; font-weight: 700;
      letter-spacing: 3px;
      color: #ffffff;
      cursor: pointer;
      text-transform: uppercase;
      transition: all .25s;
      white-space: nowrap;
      text-shadow: 0 0 10px var(--cyan);
    }
    .input-group button:hover {
      background: rgba(0,240,255,.12);
      box-shadow: 0 0 35px rgba(0,240,255,.3), inset 0 0 20px rgba(0,240,255,.08);
      text-shadow: 0 0 18px var(--cyan);
      color: var(--cyan);
    }
    .input-group button:active {
      background: rgba(0,240,255,.2);
      box-shadow: 0 0 40px rgba(0,240,255,.4);
    }

    .todo-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
    .todo-item {
      display: flex; align-items: center; gap: 14px;
      padding: 16px 14px;
      background: rgba(0,240,255,.02);
      border: 1px solid rgba(0,240,255,.15);
      border-radius: 3px;
      transition: all .3s;
      box-shadow: inset 0 0 20px rgba(0,240,255,.02);
    }
    .todo-item:hover {
      background: rgba(0,240,255,.05);
      border-color: rgba(0,240,255,.35);
      box-shadow: 0 0 12px rgba(0,240,255,.08), inset 0 0 20px rgba(0,240,255,.04);
    }
    .todo-item::before {
      content: attr(data-index);
      font-family: 'Orbitron', monospace;
      font-size: 10px; letter-spacing: 1px;
      color: rgba(0,240,255,.35);
      min-width: 32px; text-align: right;
      text-shadow: 0 0 4px rgba(0,240,255,.3);
    }
    .todo-checkbox-wrap { position: relative; flex-shrink: 0; }
    .todo-checkbox-wrap input {
      appearance: none; -webkit-appearance: none;
      width: 26px; height: 26px;
      border: 2px solid rgba(0,240,255,.3);
      border-radius: 3px;
      background: rgba(0,240,255,.03);
      cursor: pointer;
      transition: all .3s;
    }
    .todo-checkbox-wrap input:hover {
      border-color: var(--cyan);
      box-shadow: 0 0 18px rgba(0,240,255,.25);
    }
    .todo-checkbox-wrap input:checked {
      border-color: var(--green);
      background: rgba(0,255,102,.12);
      box-shadow: 0 0 18px rgba(0,255,102,.25);
    }
    .todo-checkbox-wrap input:checked::after {
      content: '✓';
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      color: var(--green); font-size: 16px; font-weight: 700;
      text-shadow: 0 0 10px var(--green), 0 0 20px var(--green);
    }
    .todo-title {
      flex: 1; font-size: 17px; font-weight: 500;
      letter-spacing: .5px; transition: all .3s; color: #ffffff;
    }
    .todo-title.completed {
      text-decoration: line-through;
      color: rgba(255,255,255,.35);
      text-decoration-color: var(--magenta);
    }
    .delete-btn {
      background: none; border: 1px solid transparent;
      color: var(--red); font-size: 20px; cursor: pointer;
      width: 36px; height: 36px; display: flex;
      align-items: center; justify-content: center;
      border-radius: 3px; transition: all .25s;
      font-family: monospace; line-height: 1; opacity: .6;
    }
    .delete-btn:hover {
      opacity: 1; border-color: var(--red);
      box-shadow: 0 0 20px rgba(255,51,102,.45);
      text-shadow: 0 0 12px var(--red);
      background: rgba(255,51,102,.12);
    }

    .empty {
      text-align: center; padding: 40px 0;
      font-family: 'Orbitron', monospace; font-size: 11px;
      letter-spacing: 3px; color: rgba(0,240,255,.35);
      text-transform: uppercase;
    }
    .empty .cursor {
      display: inline-block; width: 10px; height: 16px;
      background: var(--cyan); animation: blink .8s step-end infinite;
      vertical-align: text-bottom; margin-left: 2px;
      box-shadow: 0 0 6px var(--cyan);
    }
    @keyframes blink { 50% { opacity: 0; } }

    .stats {
      display: flex; justify-content: space-between;
      margin-top: 20px; padding-top: 16px;
      border-top: 1px solid rgba(0,240,255,.15);
      font-family: 'Orbitron', monospace; font-size: 10px;
      letter-spacing: 2px; color: rgba(0,240,255,.4);
    }
    .stats span { color: var(--cyan); text-shadow: 0 0 6px var(--cyan); }

    @media (max-width: 540px) {
      .container { padding: 24px 16px 20px; }
      h1 { font-size: 20px; letter-spacing: 4px; }
      .input-group { flex-direction: column; }
      .input-group button { padding: 14px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="status-bar">
      <span>SYS::ONLINE</span>
      <span class="blip">◈</span>
      <span id="clock">--:--:--</span>
    </div>

    <h1><span class="bracket">[</span> TODO<span class="bracket">_</span>LIST <span class="bracket">]</span></h1>

    <div class="error-msg" id="errorMsg"></div>

    <!-- ===== 登录/注册 ===== -->
    <div class="auth-section" id="authSection">
      <div class="auth-tabs">
        <button id="tabLogin" class="active" onclick="switchTab('login')">登录</button>
        <button id="tabRegister" onclick="switchTab('register')">注册</button>
      </div>
      <div class="auth-form">
        <input type="text" id="authUser" placeholder="用户名" autocomplete="username">
        <input type="password" id="authPass" placeholder="密码" autocomplete="current-password">
        <button id="authBtn" onclick="handleAuth()">▶ 登录</button>
        <div class="auth-hint" id="authHint">密码至少 4 个字符</div>
      </div>
    </div>

    <!-- ===== Todo 核心 ===== -->
    <div class="todo-section" id="todoSection">
      <div class="input-group">
        <input type="text" id="titleInput" placeholder="> 输入新任务..." maxlength="80">
        <button onclick="addTodo()">▶ 执行</button>
      </div>
      <ul class="todo-list" id="todoList"></ul>
      <p class="empty" id="emptyMsg">NO_TASKS_FOUND<span class="cursor"></span></p>
      <div class="stats">
        <span>TOTAL: <strong id="totalCount">0</strong></span>
        <span>DONE: <strong id="doneCount">0</strong></span>
      </div>
      <div id="logoutWrap" style="display:none"><button id="logoutBtn" onclick="logout()">[ 退 出 ]</button></div>
    </div>
  </div>

  <script>
    const API = '';
    let token = localStorage.getItem('token');
    let username = localStorage.getItem('username');
    let authMode = 'login';

    // ===== 初始化 =====
    if (token) { showTodos(); } else { showAuth(); }
    tick();
    setInterval(tick, 1000);

    // ===== 时钟 =====
    function tick() {
      const now = new Date();
      document.getElementById('clock').textContent =
        [now.getHours(), now.getMinutes(), now.getSeconds()]
          .map(n => String(n).padStart(2, '0')).join(':');
    }

    // ===== 界面切换 =====
    function showAuth() {
      document.getElementById('authSection').style.display = 'block';
      document.getElementById('todoSection').style.display = 'none';
      document.getElementById('titleInput').removeEventListener('keydown', addEnter);
    }
    function showTodos() {
      document.getElementById('authSection').style.display = 'none';
      document.getElementById('todoSection').style.display = 'block';
      document.getElementById('titleInput').addEventListener('keydown', addEnter);
      document.getElementById('titleInput').focus();
      fetchTodos();
      updateStatusBar();
    }
    function updateStatusBar() {
      document.getElementById('logoutWrap').style.display = 'block';
    }

    // ===== 登录/注册 =====
    function switchTab(mode) {
      authMode = mode;
      document.getElementById('tabLogin').className = mode === 'login' ? 'active' : '';
      document.getElementById('tabRegister').className = mode === 'register' ? 'active' : '';
      document.getElementById('authBtn').textContent = mode === 'login' ? '▶ 登录' : '▶ 注册';
      document.getElementById('authHint').textContent = mode === 'login' ? '还没有账号？切换注册' : '密码至少 4 个字符';
    }

    function handleAuth() {
      const user = document.getElementById('authUser').value.trim();
      const pass = document.getElementById('authPass').value.trim();
      if (!user || !pass) { showError('请输入用户名和密码'); return; }

      const endpoint = authMode === 'login' ? '/login' : '/register';
      fetch(`${API}${endpoint}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: user, password: pass }),
      })
        .then(r => r.json())
        .then(result => {
          if (result.code === 200 || result.code === 201) {
            token = result.token;
            username = result.username || user;
            localStorage.setItem('token', token);
            localStorage.setItem('username', username);
            showTodos();
          } else {
            showError(result.message);
          }
        })
        .catch(() => showError('连接服务器失败'));
    }

    // ===== 退出 =====
    function logout() {
      token = null;
      username = null;
      localStorage.removeItem('token');
      localStorage.removeItem('username');
      showAuth();
    }

    // ===== 请求头 =====
    function authHeaders(extra) {
      return { ...extra, 'Authorization': `Bearer ${token}` };
    }

    // ===== Todo CRUD =====
    async function fetchTodos() {
      try {
        const res = await fetch(`${API}/todos`, { headers: authHeaders() });
        const result = await res.json();
        if (result.code === 200) renderTodos(result.data);
        else if (result.code === 401) { logout(); showError('登录已过期'); }
      } catch { showError('⚠ 连接失败'); }
    }

    function renderTodos(todos) {
      const list = document.getElementById('todoList');
      const empty = document.getElementById('emptyMsg');
      const total = document.getElementById('totalCount');
      const done = document.getElementById('doneCount');
      total.textContent = todos.length;
      done.textContent = todos.filter(t => t.completed).length;
      if (!todos.length) { list.innerHTML = ''; empty.style.display = 'block'; return; }
      empty.style.display = 'none';
      list.innerHTML = todos.map((t, i) => `
        <li class="todo-item" data-index="${String(i + 1).padStart(2, '0')}">
          <label class="todo-checkbox-wrap">
            <input type="checkbox" ${t.completed ? 'checked' : ''} onchange="toggleTodo(${t.id})">
          </label>
          <span class="todo-title ${t.completed ? 'completed' : ''}">${escapeHtml(t.title)}</span>
          <button class="delete-btn" onclick="deleteTodo(${t.id})" title="删除">✕</button>
        </li>
      `).join('');
    }

    async function addTodo() {
      const input = document.getElementById('titleInput');
      const title = input.value.trim();
      if (!title) return;
      try {
        const res = await fetch(`${API}/todos`, {
          method: 'POST',
          headers: authHeaders({ 'Content-Type': 'application/json' }),
          body: JSON.stringify({ title }),
        });
        const result = await res.json();
        if (result.code === 201) { input.value = ''; fetchTodos(); }
        else showError(result.message);
      } catch { showError('添加失败'); }
    }

    async function toggleTodo(id) {
      try {
        await fetch(`${API}/todos/${id}`, {
          method: 'PUT',
          headers: authHeaders({ 'Content-Type': 'application/json' }),
          body: JSON.stringify({}),
        });
        fetchTodos();
      } catch { showError('更新失败'); }
    }

    async function deleteTodo(id) {
      try {
        await fetch(`${API}/todos/${id}`, {
          method: 'DELETE',
          headers: authHeaders(),
        });
        fetchTodos();
      } catch { showError('删除失败'); }
    }

    function addEnter(e) { if (e.key === 'Enter') addTodo(); }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 3500);
    }
  </script>
</body>
</html>
